<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Back link -->
  <nav class="flex items-center gap-2 text-sm text-slate-500 mb-6">
    <a routerLink="/account/addresses" class="hover:text-slate-900 inline-flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
      My Addresses
    </a>
  </nav>

  <h1 class="text-2xl font-bold tracking-tight text-slate-900 mb-6">
    {{ isEdit() ? 'Edit Address' : 'New Address' }}
  </h1>

  @if (errorMessage()) {
    <div class="mb-6">
      <app-alert-banner type="error" [message]="errorMessage()" />
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <!-- Label section -->
    <div class="p-6 border-b border-slate-100">
      <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-4">Address Label</h2>
      <div>
        <label for="label" class="block text-sm font-medium text-slate-700 mb-1.5">Label</label>
        <input
          id="label"
          type="text"
          [(ngModel)]="form.label"
          name="label"
          required
          placeholder="e.g. Home, Office, Warehouse"
          class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
        />
      </div>
    </div>

    <!-- Contact section -->
    <div class="p-6 border-b border-slate-100">
      <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-4">Contact Information</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="recipientName" class="block text-sm font-medium text-slate-700 mb-1.5">
            Recipient Name
          </label>
          <input
            id="recipientName"
            type="text"
            [(ngModel)]="form.recipientName"
            name="recipientName"
            required
            autocomplete="name"
            placeholder="Full name"
            class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
          />
        </div>
        <div>
          <label for="phoneNumber" class="block text-sm font-medium text-slate-700 mb-1.5">
            Phone Number
          </label>
          <input
            id="phoneNumber"
            type="tel"
            [(ngModel)]="form.phoneNumber"
            name="phoneNumber"
            required
            autocomplete="tel"
            placeholder="08X-XXX-XXXX"
            class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
          />
        </div>
      </div>
    </div>

    <!-- Address section -->
    <div class="p-6 border-b border-slate-100">
      <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-4">Address</h2>
      <div class="space-y-4">
        <div>
          <label for="line1" class="block text-sm font-medium text-slate-700 mb-1.5">
            Address Line 1
          </label>
          <input
            id="line1"
            type="text"
            [(ngModel)]="form.line1"
            name="line1"
            required
            autocomplete="address-line1"
            placeholder="House number, street, building"
            class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
          />
        </div>

        <div>
          <label for="line2" class="block text-sm font-medium text-slate-700 mb-1.5">
            Address Line 2
            <span class="text-slate-400 font-normal">(Optional)</span>
          </label>
          <input
            id="line2"
            type="text"
            [(ngModel)]="form.line2"
            name="line2"
            autocomplete="address-line2"
            placeholder="Floor, unit, village"
            class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
          />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="subdistrict" class="block text-sm font-medium text-slate-700 mb-1.5">
              Subdistrict
            </label>
            <input
              id="subdistrict"
              type="text"
              [(ngModel)]="form.subdistrict"
              name="subdistrict"
              required
              placeholder="Subdistrict / Tambon"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>
          <div>
            <label for="district" class="block text-sm font-medium text-slate-700 mb-1.5">
              District
            </label>
            <input
              id="district"
              type="text"
              [(ngModel)]="form.district"
              name="district"
              required
              placeholder="District / Amphoe"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="province" class="block text-sm font-medium text-slate-700 mb-1.5">
              Province
            </label>
            <input
              id="province"
              type="text"
              [(ngModel)]="form.province"
              name="province"
              required
              placeholder="Province"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>
          <div>
            <label for="postalCode" class="block text-sm font-medium text-slate-700 mb-1.5">
              Postal Code
            </label>
            <input
              id="postalCode"
              type="text"
              [(ngModel)]="form.postalCode"
              name="postalCode"
              required
              autocomplete="postal-code"
              placeholder="10XXX"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Settings section -->
    <div class="p-6 border-b border-slate-100">
      <label for="isDefault" class="flex items-center gap-3 cursor-pointer">
        <input
          id="isDefault"
          type="checkbox"
          [(ngModel)]="form.isDefault"
          name="isDefault"
          class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
        />
        <div>
          <span class="text-sm font-medium text-slate-900">Set as default address</span>
          <p class="text-xs text-slate-500">This address will be pre-selected during checkout.</p>
        </div>
      </label>
    </div>

    <!-- Actions -->
    <div class="bg-slate-50 px-6 py-4 flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        class="rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 shadow-sm cursor-pointer"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="saving()"
        class="rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500 shadow-sm disabled:bg-slate-300 disabled:cursor-not-allowed cursor-pointer"
      >
        @if (saving()) {
          <span class="inline-flex items-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" /><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg>
            Saving...
          </span>
        } @else {
          {{ isEdit() ? 'Update Address' : 'Create Address' }}
        }
      </button>
    </div>
  </form>
</div>

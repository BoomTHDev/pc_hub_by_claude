<div class="flex min-h-[calc(100vh-5rem)]">
  <!-- Left brand panel (hidden on mobile) -->
  <div class="hidden lg:flex lg:w-1/2 bg-slate-900 items-center justify-center p-12">
    <div class="max-w-md text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 text-white text-2xl font-bold mb-6">PC</div>
      <h2 class="text-3xl font-bold text-white tracking-tight">Join PC Hub</h2>
      <p class="mt-3 text-slate-400 leading-relaxed">
        Create your account to start building your dream PC with quality components and competitive prices.
      </p>
      <div class="mt-8 grid grid-cols-3 gap-4 text-center">
        <div>
          <p class="text-lg font-bold text-white">Free</p>
          <p class="text-xs text-slate-500">Shipping</p>
        </div>
        <div>
          <p class="text-lg font-bold text-white">24/7</p>
          <p class="text-xs text-slate-500">Support</p>
        </div>
        <div>
          <p class="text-lg font-bold text-white">100%</p>
          <p class="text-xs text-slate-500">Warranty</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12 bg-slate-50">
    <div class="w-full max-w-md">
      <!-- Mobile logo -->
      <div class="lg:hidden text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 text-white text-lg font-bold">PC</div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <div class="mb-6">
          <h1 class="text-2xl font-bold tracking-tight text-slate-900">Create account</h1>
          <p class="mt-1 text-sm text-slate-500">
            Already have an account?
            <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">
              Sign in
            </a>
          </p>
        </div>

        @if (errorMessage()) {
          <div class="mb-6">
            <app-alert-banner type="error" [message]="errorMessage()" />
          </div>
        }

        <form (ngSubmit)="onSubmit()" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="firstName" class="block text-sm font-medium text-slate-700 mb-1.5">
                First name
              </label>
              <input
                id="firstName"
                type="text"
                [(ngModel)]="firstName"
                name="firstName"
                required
                autocomplete="given-name"
                placeholder="John"
                class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
              />
            </div>
            <div>
              <label for="lastName" class="block text-sm font-medium text-slate-700 mb-1.5">
                Last name
              </label>
              <input
                id="lastName"
                type="text"
                [(ngModel)]="lastName"
                name="lastName"
                required
                autocomplete="family-name"
                placeholder="Doe"
                class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
              />
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
              Email address
            </label>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              required
              autocomplete="email"
              placeholder="you@example.com"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>

          <div>
            <label for="phoneNumber" class="block text-sm font-medium text-slate-700 mb-1.5">
              Phone number
            </label>
            <input
              id="phoneNumber"
              type="tel"
              [(ngModel)]="phoneNumber"
              name="phoneNumber"
              required
              autocomplete="tel"
              placeholder="08X-XXX-XXXX"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">
              Password
            </label>
            <input
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="Minimum 8 characters"
              class="block w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none"
            />
          </div>

          <button
            type="submit"
            [disabled]="loading()"
            class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500 shadow-sm disabled:bg-slate-300 disabled:cursor-not-allowed"
          >
            {{ loading() ? 'Creating account...' : 'Create account' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

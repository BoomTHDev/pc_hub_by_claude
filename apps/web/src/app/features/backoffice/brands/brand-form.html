<div>
  <a routerLink="/backoffice/brands" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-indigo-600 mb-5 transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
    Back to Brands
  </a>

  <h1 class="text-2xl font-bold text-slate-900 mb-6">{{ isEdit() ? 'Edit Brand' : 'New Brand' }}</h1>

  @if (loading()) {
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-lg animate-pulse space-y-4">
      @for (_ of [1, 2, 3]; track $index) {
        <div class="space-y-1.5">
          <div class="h-3 w-20 bg-slate-200 rounded"></div>
          <div class="h-10 bg-slate-200 rounded-lg"></div>
        </div>
      }
    </div>
  } @else {
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden max-w-lg">
      <div class="p-6 space-y-5">
        <div>
          <label for="bf-name" class="block text-sm font-medium text-slate-700 mb-1.5">Name</label>
          <input
            id="bf-name"
            type="text"
            [(ngModel)]="form.name"
            placeholder="Brand name"
            class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
        <div>
          <label for="bf-slug" class="block text-sm font-medium text-slate-700 mb-1.5">Slug</label>
          <input
            id="bf-slug"
            type="text"
            [(ngModel)]="form.slug"
            placeholder="brand-slug"
            class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
        <div>
          <label for="bf-logo" class="block text-sm font-medium text-slate-700 mb-1.5">Logo URL</label>
          <input
            id="bf-logo"
            type="text"
            [(ngModel)]="form.logoUrl"
            placeholder="https://..."
            class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
      </div>

      @if (errorMsg()) {
        <div class="px-6">
          <app-alert-banner type="error" [message]="errorMsg()" />
        </div>
      }

      <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center gap-3">
        <button
          (click)="onSave()"
          [disabled]="saving()"
          class="inline-flex items-center px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 text-sm font-semibold shadow-sm cursor-pointer disabled:opacity-50"
        >
          {{ saving() ? 'Saving...' : (isEdit() ? 'Update Brand' : 'Create Brand') }}
        </button>
        <a
          routerLink="/backoffice/brands"
          class="inline-flex items-center px-5 py-2.5 border border-slate-300 bg-white text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-semibold"
        >
          Cancel
        </a>
      </div>
    </div>
  }
</div>

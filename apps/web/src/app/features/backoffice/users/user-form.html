@if (!validRole()) {
  <p class="text-slate-500">Redirecting...</p>
} @else {
<div>
  <a routerLink="/backoffice/users" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-indigo-600 mb-5 transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
    Back to Users
  </a>

  <h1 class="text-2xl font-bold text-slate-900 mb-6">Create {{ roleLabel() }}</h1>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden max-w-lg">
    <div class="p-6 space-y-5">
      <div>
        <label for="uf-fn" class="block text-sm font-medium text-slate-700 mb-1.5">First Name</label>
        <input
          id="uf-fn"
          type="text"
          [(ngModel)]="form.firstName"
          placeholder="First name"
          autocomplete="given-name"
          class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>
      <div>
        <label for="uf-ln" class="block text-sm font-medium text-slate-700 mb-1.5">Last Name</label>
        <input
          id="uf-ln"
          type="text"
          [(ngModel)]="form.lastName"
          placeholder="Last name"
          autocomplete="family-name"
          class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>
      <div>
        <label for="uf-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <input
          id="uf-email"
          type="email"
          [(ngModel)]="form.email"
          placeholder="user@example.com"
          autocomplete="email"
          class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>
      <div>
        <label for="uf-phone" class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
        <input
          id="uf-phone"
          type="text"
          [(ngModel)]="form.phoneNumber"
          placeholder="0812345678"
          autocomplete="tel"
          class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>
      <div>
        <label for="uf-pass" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
        <input
          id="uf-pass"
          type="password"
          [(ngModel)]="form.password"
          placeholder="Minimum 8 characters"
          autocomplete="new-password"
          class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        />
        <p class="text-xs text-slate-400 mt-1.5">Minimum 8 characters</p>
      </div>
    </div>

    @if (errorMsg()) {
      <div class="px-6">
        <app-alert-banner type="error" [message]="errorMsg()" />
      </div>
    }

    <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center gap-3">
      <button
        (click)="onSubmit()"
        [disabled]="saving()"
        class="inline-flex items-center px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 text-sm font-semibold shadow-sm cursor-pointer disabled:opacity-50"
      >
        {{ saving() ? 'Creating...' : 'Create ' + roleLabel() }}
      </button>
      <a
        routerLink="/backoffice/users"
        class="inline-flex items-center px-5 py-2.5 border border-slate-300 bg-white text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-semibold"
      >
        Cancel
      </a>
    </div>
  </div>
</div>
}

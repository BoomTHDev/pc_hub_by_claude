@switch (variant()) {
  @case ('card') {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (_ of items(); track $index) {
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-pulse">
          <div class="aspect-square bg-slate-200"></div>
          <div class="p-4 space-y-2.5">
            <div class="h-3 bg-slate-200 rounded w-1/3"></div>
            <div class="h-4 bg-slate-200 rounded w-2/3"></div>
            <div class="h-3 bg-slate-200 rounded w-1/4"></div>
            <div class="h-5 bg-slate-200 rounded w-1/2 mt-2"></div>
          </div>
        </div>
      }
    </div>
  }

  @case ('table-row') {
    <div class="space-y-0">
      @for (_ of items(); track $index) {
        <div class="flex items-center gap-4 px-4 py-3.5 animate-pulse border-b border-slate-100 last:border-b-0">
          <div class="h-4 bg-slate-200 rounded w-24"></div>
          <div class="h-4 bg-slate-200 rounded w-32"></div>
          <div class="h-4 bg-slate-200 rounded w-20"></div>
          <div class="flex-1"></div>
          <div class="h-4 bg-slate-200 rounded w-16"></div>
        </div>
      }
    </div>
  }

  @case ('detail') {
    <div class="animate-pulse space-y-6">
      <div class="flex items-center gap-4">
        <div class="h-8 bg-slate-200 rounded w-48"></div>
        <div class="h-6 bg-slate-200 rounded-full w-24"></div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
        <div class="h-4 bg-slate-200 rounded w-1/3"></div>
        <div class="h-4 bg-slate-200 rounded w-full"></div>
        <div class="h-4 bg-slate-200 rounded w-2/3"></div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-32 bg-slate-200 rounded"></div>
      </div>
    </div>
  }
}

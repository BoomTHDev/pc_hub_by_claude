<a
  [routerLink]="['/products', product().slug]"
  class="group block bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 card-hover card-elevation-1"
>
  <div class="aspect-square bg-slate-100 overflow-hidden relative">
    <img
      [src]="product().image ?? '/images/no-image.svg'"
      [alt]="product().name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
    />
    @if (product().stock === 0) {
      <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
        <span class="text-white font-semibold text-sm bg-red-600 px-3 py-1 rounded-full">Out of Stock</span>
      </div>
    }
    @if (product().warrantyMonths) {
      <div class="absolute top-2 right-2">
        <span class="inline-flex items-center gap-1 bg-white/90 backdrop-blur-sm text-slate-700 text-[10px] font-semibold px-2 py-0.5 rounded-full shadow-sm border border-white/60">
          <svg class="w-3 h-3 text-emerald-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" /></svg>
          {{ product().warrantyMonths }}mo
        </span>
      </div>
    }
  </div>
  <div class="p-4">
    <p class="text-[11px] text-slate-400 mb-1 font-semibold uppercase tracking-wider">
      {{ product().brand.name }}
    </p>
    <h3
      class="text-sm font-semibold text-slate-900 line-clamp-2 min-h-10 leading-tight group-hover:text-indigo-600 transition-colors"
    >
      {{ product().name }}
    </h3>
    <p class="text-xs text-slate-400 mt-1.5">
      {{ product().category.name }}
    </p>
    <div class="mt-3.5 flex items-center justify-between">
      <p class="text-lg font-bold text-indigo-600">
        {{ product().price | thaiBaht }}
      </p>
      <div class="flex items-center gap-1.5">
        @if (product().stock > 0) {
          <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
          <span class="text-xs text-emerald-600 font-medium">In stock</span>
        }
        <svg
          class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 group-hover:translate-x-0.5 transition-all duration-200 ml-1"
          fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
      </div>
    </div>
  </div>
</a>

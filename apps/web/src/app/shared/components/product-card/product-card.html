<a
  [routerLink]="['/products', product().slug]"
  class="group block bg-white rounded-xl shadow-sm border border-slate-200/60 overflow-hidden hover:shadow-lg transition-all duration-300 card-hover card-elevation-1"
>
  <div class="aspect-square bg-slate-100 overflow-hidden relative">
    <img
      [src]="product().image ?? '/images/no-image.svg'"
      [alt]="product().name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
    />
    @if (product().stock === 0) {
      <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
        <span class="text-white font-semibold text-sm bg-red-600 px-3 py-1 rounded-full">Out of Stock</span>
      </div>
    }
  </div>
  <div class="p-4">
    <p class="text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">
      {{ product().brand.name }}
    </p>
    <h3
      class="text-sm font-semibold text-slate-900 line-clamp-2 min-h-10 leading-tight group-hover:text-indigo-600 transition-colors"
    >
      {{ product().name }}
    </h3>
    <p class="text-xs text-slate-500 mt-2">
      {{ product().category.name }}
    </p>
    <div class="mt-3 flex items-center justify-between">
      <p class="text-lg font-bold text-indigo-600">
        {{ product().price | thaiBaht }}
      </p>
      @if (product().stock > 0) {
        <div class="flex items-center gap-1">
          <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
          <span class="text-xs text-emerald-600 font-medium">In stock</span>
        </div>
      }
    </div>
  </div>
</a>

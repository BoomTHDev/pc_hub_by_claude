<div class="text-center py-16">
  <!-- Projected icon slot -->
  <div class="mb-4">
    <ng-content select="[icon]">
      <!-- Default icon if none projected -->
    </ng-content>
  </div>

  <h3 class="text-lg font-semibold text-slate-900 mb-1">{{ title() }}</h3>

  @if (description()) {
    <p class="text-sm text-slate-500 mb-6 max-w-sm mx-auto">{{ description() }}</p>
  }

  @if (actionLabel()) {
    <button
      (click)="onAction()"
      class="rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500 shadow-sm cursor-pointer"
    >
      {{ actionLabel() }}
    </button>
  }

  <!-- Projected extra content -->
  <ng-content />
</div>

@if (totalPages() > 1) {
  <nav class="flex items-center justify-center gap-1 mt-8">
    <button
      (click)="onPage(page() - 1)"
      [disabled]="page() <= 1"
      class="px-3 py-2 text-sm rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Previous
    </button>

    @for (p of pages(); track p) {
      @if (p === -1) {
        <span class="px-2 py-2 text-sm text-slate-400">...</span>
      } @else {
        <button
          (click)="onPage(p)"
          [class]="
            p === page()
              ? 'px-3 py-2 text-sm rounded-lg bg-indigo-600 text-white font-medium shadow-sm'
              : 'px-3 py-2 text-sm rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50'
          "
        >
          {{ p }}
        </button>
      }
    }

    <button
      (click)="onPage(page() + 1)"
      [disabled]="page() >= totalPages()"
      class="px-3 py-2 text-sm rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Next
    </button>
  </nav>
}

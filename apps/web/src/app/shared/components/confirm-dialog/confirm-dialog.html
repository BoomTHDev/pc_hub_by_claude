@if (open()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4 animate-fade-in"
    (click)="onBackdropClick($event)"
    (keydown.escape)="onCancel()"
    role="dialog"
    aria-modal="true"
  >
    <!-- Dialog -->
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform animate-scale-in card-elevation-3">
      <!-- Icon -->
      <div class="flex items-center justify-center w-14 h-14 rounded-full mx-auto mb-4"
        [class]="destructive() ? 'bg-gradient-to-br from-red-100 to-red-200' : 'bg-gradient-to-br from-indigo-100 to-indigo-200'"
      >
        @if (destructive()) {
          <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
          </svg>
        } @else {
          <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" />
          </svg>
        }
      </div>

      <!-- Content -->
      <h3 class="text-xl font-bold text-slate-900 text-center mb-3">{{ title() }}</h3>
      <p class="text-sm text-slate-600 text-center mb-8 leading-relaxed">{{ message() }}</p>

      <!-- Actions -->
      <div class="flex gap-3">
        <button
          (click)="onCancel()"
          class="flex-1 rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 hover:border-slate-400 transition-all cursor-pointer"
        >
          {{ cancelLabel() }}
        </button>
        <button
          (click)="onConfirm()"
          class="flex-1 rounded-xl px-4 py-3 text-sm font-semibold text-white transition-all cursor-pointer hover:scale-105"
          [class]="destructive()
            ? 'bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-600 shadow-lg hover:shadow-xl'
            : 'bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-600 shadow-lg hover:shadow-xl'"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}

@if (open()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
    (click)="onBackdropClick($event)"
    (keydown.escape)="onCancel()"
    role="dialog"
    aria-modal="true"
  >
    <!-- Dialog -->
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
      <!-- Icon -->
      <div class="flex items-center justify-center w-12 h-12 rounded-full mx-auto mb-4"
        [class]="destructive() ? 'bg-red-100' : 'bg-indigo-100'"
      >
        @if (destructive()) {
          <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
          </svg>
        } @else {
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" />
          </svg>
        }
      </div>

      <!-- Content -->
      <h3 class="text-lg font-semibold text-slate-900 text-center mb-2">{{ title() }}</h3>
      <p class="text-sm text-slate-500 text-center mb-6">{{ message() }}</p>

      <!-- Actions -->
      <div class="flex gap-3">
        <button
          (click)="onCancel()"
          class="flex-1 rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 cursor-pointer"
        >
          {{ cancelLabel() }}
        </button>
        <button
          (click)="onConfirm()"
          class="flex-1 rounded-lg px-4 py-2.5 text-sm font-semibold text-white cursor-pointer"
          [class]="destructive()
            ? 'bg-red-600 hover:bg-red-500'
            : 'bg-indigo-600 hover:bg-indigo-500'"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}

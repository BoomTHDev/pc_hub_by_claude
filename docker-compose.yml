services:
  mysql:
    image: mysql:8.0
    container_name: pc_hub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: pc_hub_user
      MYSQL_PASSWORD: pc_hub_pass
      MYSQL_DATABASE: pc_hub_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
